name: Module Common CI
on:
  workflow_call:
    inputs:
      package-path:
        required: true
        type: string

permissions:
  id-token: write # Required for OIDC
  contents: read

env:
  # Setting an environment variable with the value of a configuration variable
  PUBLISH_BRANCH: "refs/heads/main"
  PACKAGE_NAME: "unknown"
  PACKAGE_VERSION: "unknown"
  NPM_VERSION: "unknown"
  HAVE_VALIDATE_SCRIPT: true
  HAVE_LINT_SCRIPT: true
  HAVE_TEST_SCRIPT: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: luolapeikko/github-actions/read-package-info@4cfb7e8c7b146d81e5dd64b37a5e4da6418c5627 # v0
        with:
          working-directory: ${{ inputs.package-path }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Install workspace deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Validate
        if: env.HAVE_VALIDATE_SCRIPT == 'true'
        run: npm run validate

      - name: Test
        if: env.HAVE_TEST_SCRIPT == 'true'
        run: npm test

      - name: Lint
        if: env.HAVE_LINT_SCRIPT == 'true'
        run: npm run lint

      - name: Publish ${{env.PACKAGE_NAME}} ${{env.PACKAGE_VERSION}}
        working-directory: ${{ inputs.package-path }}
        if: |
          github.ref == env.PUBLISH_BRANCH &&
          env.PACKAGE_VERSION != env.NPM_VERSION
        run: npm publish --access public
